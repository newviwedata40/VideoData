<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Portal - User View</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e50914; --bg: #0f0f0f; --card: #1e1e1e; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }
        header { background: rgba(0,0,0,0.9); padding: 20px; text-align: center; border-bottom: 2px solid var(--primary); position: sticky; top: 0; z-index: 100; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .video-card { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .video-header { padding: 15px; font-weight: bold; color: var(--primary); background: #282828; }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        #loader { display: none; width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pagination { display: flex; justify-content: center; gap: 15px; padding: 20px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body>

    <header><h1>VIDEO PORTAL</h1></header>
    <div class="container">
        <div id="loader"></div>
        <div id="video-content"></div>
        <div class="pagination">
            <button class="btn" id="prevBtn" onclick="changePage(-1)">← Previous</button>
            <button class="btn" id="nextBtn" onclick="changePage(1)">Next →</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBePGA5jLdmMOEOp0HGg921-H7rNpAwGKg",
            authDomain: "data-videos-786f4.firebaseapp.com",
            databaseURL: "https://data-videos-786f4-default-rtdb.firebaseio.com",
            projectId: "data-videos-786f4",
            storageBucket: "data-videos-786f4.firebasestorage.app",
            messagingSenderId: "471544558731",
            appId: "1:471544558731:web:a43264adfbd666dac1d08e"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database().ref("videos");

        let allVideos = [];
        let currentPage = 1;
        const perPage = 10;

        function fetchVideos() {
            document.getElementById('loader').style.display = 'block';
            db.on('value', (snapshot) => {
                allVideos = [];
                snapshot.forEach((child) => {
                    allVideos.push({ id: child.key, ...child.val() });
                });
                // Newest first
                allVideos.sort((a, b) => b.timestamp - a.timestamp);
                renderPage();
            }, (error) => {
                console.error("Firebase Error:", error);
                alert("Database Connection Error. Please check Firebase Rules.");
            });
        }

        function renderPage() {
            const content = document.getElementById('video-content');
            document.getElementById('loader').style.display = 'none';
            content.innerHTML = "";
            
            if(allVideos.length === 0) {
                content.innerHTML = "<p style='text-align:center;'>No videos found. Add some from Admin Panel.</p>";
                return;
            }

            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const items = allVideos.slice(start, end);

            items.forEach((vid) => {
                content.innerHTML += `
                    <div class="video-card">
                        <div class="video-header">${vid.title}</div>
                        <div class="iframe-container">
                            <iframe src="${vid.url}" allowfullscreen></iframe>
                        </div>
                    </div>`;
            });

            document.getElementById('prevBtn').disabled = (currentPage === 1);
            document.getElementById('nextBtn').disabled = (end >= allVideos.length);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changePage(dir) { currentPage += dir; renderPage(); }
        fetchVideos();
    </script>
</body>
</html>
