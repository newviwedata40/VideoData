<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Stream Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e50914; /* Netflix Red */
            --bg-color: #0f0f0f;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        header {
            background-color: rgba(0, 0, 0, 0.9);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid var(--primary-color);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 0 15px;
        }

        /* Video Card Styling */
        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        .video-card:hover {
            transform: translateY(-5px);
        }

        .video-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #282828;
        }

        .video-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Responsive Iframe Container */
        .iframe-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background: #000;
        }

        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Loading Spinner */
        #loader {
            display: none;
            width: 50px;
            height: 50px;
            border: 5px solid #333;
            border-top: 5px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Pagination Buttons */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 40px 0;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
        }

        .btn:active { transform: scale(0.95); }
        .btn:disabled { background-color: #444; cursor: not-allowed; opacity: 0.6; }

        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .video-title { font-size: 1rem; }
            .btn { padding: 10px 20px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>VIDEO PORTAL</h1>
    </header>

    <div class="container">
        <div id="loader"></div>

        <div id="video-content"></div>

        <div class="pagination">
            <button class="btn" id="prevBtn" onclick="navigatePage(-1)">← Previous</button>
            <button class="btn" id="nextBtn" onclick="navigatePage(1)">Next Page →</button>
        </div>
    </div>

    <footer>
        © 2026 Video Portal - All Rights Reserved
    </footer>

    <script>
        // ADD YOUR LINKS HERE - Newest at the bottom
        const videoDatabase = [
            "https://streamtape.to/e/0A3koJk2LzHbzl4/1_video",
            // "https://streamtape.to/e/link2",
            // "https://streamtape.to/e/link3",
        ];

        let currentPage = 1;
        const perPage = 10;

        function loadVideos() {
            const content = document.getElementById('video-content');
            const loader = document.getElementById('loader');

            // Show Loader and hide content
            content.style.display = "none";
            loader.style.display = "block";

            // Smooth Scroll to Top
            window.scrollTo({ top: 0, behavior: 'smooth' });

            setTimeout(() => {
                loader.style.display = "none";
                content.style.display = "block";
                content.innerHTML = "";

                // Reverse the array so new links are shown first
                const reversedData = [...videoDatabase].reverse();
                
                const start = (currentPage - 1) * perPage;
                const end = start + perPage;
                const pageItems = reversedData.slice(start, end);

                pageItems.forEach((url, index) => {
                    // Calculate original video number
                    const videoNumber = reversedData.length - (start + index);
                    
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.innerHTML = `
                        <div class="video-header">
                            <span class="video-title">Video #${videoNumber}</span>
                        </div>
                        <div class="iframe-container">
                            <iframe src="${url}" allowfullscreen scrolling="no"></iframe>
                        </div>
                    `;
                    content.appendChild(card);
                });

                // Update Buttons
                document.getElementById('prevBtn').disabled = (currentPage === 1);
                document.getElementById('nextBtn').disabled = (end >= videoDatabase.length);
                
            }, 1000); // 1 second loading effect
        }

        function navigatePage(direction) {
            currentPage += direction;
            loadVideos();
        }

        // Initial Load
        loadVideos();
    </script>

</body>
</html>
